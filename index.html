<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌻</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --petal: #FFC93C;
    --petal-deep: #F4A300;
    --center: #6B4226;
    --center-dark: #4A2C18;
    --leaf: #4C7031;
    --cream: #FFF8E7;
    --ink: #3B2A12;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    width:100%; height:100%;
    overflow:hidden;
    background: radial-gradient(circle at 50% 40%, #FFFBF0 0%, var(--cream) 60%, #FCEBB6 100%);
    font-family: 'Quicksand', sans-serif;
  }

  button#field{
    all: unset;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100vw;
    height:100vh;
    position:relative;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  button#field:focus-visible{
    outline: 4px solid var(--leaf);
    outline-offset: -8px;
  }

  /* ---- Sunflower built from CSS ---- */
  .flower{
    position:relative;
    width:min(60vmin, 420px);
    height:min(60vmin, 420px);
    transition: transform .5s ease;
  }

  button#field:hover .flower{
    transform: scale(1.04) rotate(2deg);
  }

  .petal{
    position:absolute;
    top:50%; left:50%;
    width:18%;
    height:46%;
    background: linear-gradient(180deg, var(--petal) 0%, var(--petal-deep) 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    transform-origin: 50% 100%;
    box-shadow: inset 0 -6px 10px rgba(180,110,0,0.25);
  }

  .center{
    position:absolute;
    top:50%; left:50%;
    width:42%;
    height:42%;
    transform: translate(-50%,-50%);
    background:
      radial-gradient(circle at 35% 30%, #8A5A33 0 3%, transparent 3.2%) ,
      radial-gradient(circle at 55% 25%, #5C3A1E 0 3%, transparent 3.2%),
      radial-gradient(circle at 70% 45%, #8A5A33 0 3%, transparent 3.2%),
      radial-gradient(circle at 30% 55%, #5C3A1E 0 3%, transparent 3.2%),
      radial-gradient(circle at 50% 60%, #8A5A33 0 3%, transparent 3.2%),
      radial-gradient(circle at 65% 70%, #5C3A1E 0 3%, transparent 3.2%),
      radial-gradient(circle at 40% 75%, #8A5A33 0 3%, transparent 3.2%),
      radial-gradient(circle, var(--center) 0%, var(--center-dark) 100%);
    border-radius:50%;
    box-shadow: 0 8px 18px rgba(74,44,24,0.4), inset 0 -4px 8px rgba(0,0,0,0.25);
    z-index:2;
  }

  .prompt{
    position:absolute;
    bottom: 9%;
    left:50%;
    transform: translateX(-50%);
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size: clamp(1rem, 3.2vw, 1.4rem);
    color: var(--ink);
    letter-spacing: .5px;
    opacity:.75;
  }

  .leaf{
    position:absolute;
    width: 70px;
    height: 32px;
    background: var(--leaf);
    border-radius: 0 100% 0 100%;
    bottom: -10px;
    opacity:.85;
  }
  .leaf.left{ left: 10%; transform: rotate(15deg); }
  .leaf.right{ right: 10%; transform: scaleX(-1) rotate(15deg); }

  /* generate 14 petals via nth-child rotation */
  .petal:nth-child(1){ transform: translate(-50%,-100%) rotate(0deg); }
  .petal:nth-child(2){ transform: translate(-50%,-100%) rotate(25.7deg); }
  .petal:nth-child(3){ transform: translate(-50%,-100%) rotate(51.4deg); }
  .petal:nth-child(4){ transform: translate(-50%,-100%) rotate(77.1deg); }
  .petal:nth-child(5){ transform: translate(-50%,-100%) rotate(102.8deg); }
  .petal:nth-child(6){ transform: translate(-50%,-100%) rotate(128.5deg); }
  .petal:nth-child(7){ transform: translate(-50%,-100%) rotate(154.2deg); }
  .petal:nth-child(8){ transform: translate(-50%,-100%) rotate(180deg); }
  .petal:nth-child(9){ transform: translate(-50%,-100%) rotate(205.7deg); }
  .petal:nth-child(10){ transform: translate(-50%,-100%) rotate(231.4deg); }
  .petal:nth-child(11){ transform: translate(-50%,-100%) rotate(257.1deg); }
  .petal:nth-child(12){ transform: translate(-50%,-100%) rotate(282.8deg); }
  .petal:nth-child(13){ transform: translate(-50%,-100%) rotate(308.5deg); }
  .petal:nth-child(14){ transform: translate(-50%,-100%) rotate(334.2deg); }

  /* ---- Burst state ---- */
  .flower.burst .petal{
    animation: flyout .7s cubic-bezier(.2,.9,.3,1) forwards;
  }
  .flower.burst .center{
    animation: pulse .7s ease forwards;
  }
  .flower.burst .leaf{
    animation: droop .7s ease forwards;
  }
  .flower.burst .prompt{ opacity:0; transition: opacity .2s; }

  @keyframes flyout{
    to{
      transform: translate(-50%,-100%) translateY(-220px) rotate(var(--r, 0deg)) scale(.4);
      opacity:0;
    }
  }
  @keyframes pulse{
    0%{ transform: translate(-50%,-50%) scale(1); }
    40%{ transform: translate(-50%,-50%) scale(1.5); filter: brightness(1.3); }
    100%{ transform: translate(-50%,-50%) scale(0); opacity:0; }
  }
  @keyframes droop{
    to{ opacity:0; transform: scale(.3) translateY(40px); }
  }

  /* ---- Reveal message ---- */
  .reveal{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 0 6vw;
    opacity:0;
    pointer-events:none;
  }

  .reveal h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: clamp(2.2rem, 9vw, 5.5rem);
    line-height: 1.05;
    color: var(--center-dark);
    text-shadow: 0 4px 0 var(--petal), 0 10px 24px rgba(74,44,24,0.35);
    letter-spacing: -1px;
  }

  .reveal .sub{
    margin-top: 1.2rem;
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    font-size: clamp(.9rem, 2.2vw, 1.2rem);
    color: var(--leaf);
    opacity:0;
  }

  .revealed .reveal{
    animation: revealIn .8s ease forwards .35s;
  }
  .revealed .reveal .sub{
    animation: fadeUp .6s ease forwards 1.3s;
  }

  @keyframes revealIn{
    0%{ opacity:0; transform: scale(.4) rotate(-8deg); }
    55%{ opacity:1; transform: scale(1.12) rotate(2deg); }
    75%{ transform: scale(.96) rotate(-1deg); }
    100%{ opacity:1; transform: scale(1) rotate(0deg); }
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }

  /* shake the whole field for drama */
  .revealed{ animation: shake .5s ease .3s; }
  @keyframes shake{
    0%,100%{ transform: translate(0,0); }
    20%{ transform: translate(-6px,2px); }
    40%{ transform: translate(6px,-3px); }
    60%{ transform: translate(-4px,3px); }
    80%{ transform: translate(4px,-2px); }
  }

  /* falling petal confetti on reveal */
  .confetti{
    position:absolute;
    top:-10%;
    width: 14px;
    height: 14px;
    background: var(--petal);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity:0;
  }
  .revealed .confetti{
    animation: fall 2.4s ease-in forwards;
  }
  @keyframes fall{
    0%{ opacity:1; transform: translateY(0) rotate(0deg); }
    100%{ opacity:.9; transform: translateY(110vh) rotate(540deg); }
  }
</style>
</head>
<body>

<button id="field" aria-label="Tap the sunflower to reveal a message">
  <div class="flower" id="flower">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
    <div class="prompt">tap the sunflower 🌻</div>
  </div>

  <div class="reveal">
    <div>
      <h1>Check your<br>junk/spam folder</h1>
      <div class="sub">RKSMKD🌻</div>
    </div>
  </div>
</button>

<script>
  const field = document.getElementById('field');
  const flower = document.getElementById('flower');
  let done = false;

  function burst(){
    if (done) return;
    done = true;

    flower.classList.add('burst');
    field.classList.add('revealed');

    // scatter confetti petals
    for(let i=0;i<24;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + 'vw';
      c.style.animationDelay = (Math.random()*0.6) + 's';
      c.style.background = Math.random() > 0.5 ? '#FFC93C' : '#F4A300';
      c.style.transform = `scale(${0.6 + Math.random()*0.8})`;
      field.appendChild(c);
    }

    // little haptic-style buzz on supporting devices
    if (navigator.vibrate) navigator.vibrate([40,30,60]);
  }

  field.addEventListener('click', burst);
  field.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); burst(); }
  });
</script>

</body>
</html>
